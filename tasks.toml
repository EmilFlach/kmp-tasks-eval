# KMP Tasks Eval — task definitions
#
# Two task types are supported:
#
#   type = "commit"  (default)
#     The agent starts at parent_sha and must reproduce the changes in commit_sha.
#
#   type = "generation"
#     The agent starts with an empty directory and must generate a project from
#     scratch.  The reference is downloaded at runtime from generation_url (a
#     zip archive, e.g. from the KMP Wizard backend).
#
# Common fields
# -------------
# id             unique slug used as --tasks filter
# name           human-readable label
# category       Managing Dependencies | Building | Testing | Optimizing | Distributing | Maintaining | Generating
# prompt         task description given to the agent
# run_build      whether to run the JVM build step after the agent (default: true for commit, false for generation)
# build_task     Gradle task for JVM compile check (default: :app:shared:compileKotlinJvm)
# min_similarity line-level similarity threshold per file (default: 0.70)
# skip_patterns  list of path substrings to exclude from verification (default: [])
#
# Commit task fields
# ------------------
# parent_sha     full SHA the agent's project is extracted from
# commit_sha     short SHA the agent must reproduce
# repo_url       git repo to clone/extract from (default: https://github.com/JetBrains/kotlinconf-app)
#
# Generation task fields
# ----------------------
# type           must be "generation"
# generation_url URL that returns a zip of the reference project (e.g. KMP Wizard)

