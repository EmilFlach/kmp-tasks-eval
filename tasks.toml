[[tasks]]
id          = "alarm-permission-android-s"
name        = "Fix exact-alarm permission handling for Android S"
category    = "Building"
parent_sha  = "2aaa1502e1029e32dace6594f704b89f8f0463e5"
commit_sha  = "9b792293"
run_build   = false   # androidMain only; JVM compile not relevant
min_similarity = 0.80
prompt = """
On Android S (API 31–32) exact alarms require the user-revocable \
`SCHEDULE_EXACT_ALARM` permission, whereas on API 33+ the automatically-granted \
`USE_EXACT_ALARM` is used. Fix the notification service to handle both cases.
Files:
  shared/src/androidMain/AndroidManifest.xml
  shared/src/androidMain/kotlin/org/jetbrains/kotlinconf/AndroidLocalNotificationService.kt
Changes:
1. Add `<uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>` \
to the manifest (alongside the existing USE_EXACT_ALARM entry).
2. Add a private `getRelevantAlarmPermission(): String?` helper that returns \
`USE_EXACT_ALARM` for API 33+, `SCHEDULE_EXACT_ALARM` for API 31–32, and null for older.
3. In `requestPermission()`, replace the hardcoded permissions array with \
`listOfNotNull(POST_NOTIFICATIONS, getRelevantAlarmPermission())`.
4. In the alarm scheduling code, replace the hardcoded `USE_EXACT_ALARM` check \
with a call to `getRelevantAlarmPermission()`, only skipping if it is non-null \
and not granted."""

