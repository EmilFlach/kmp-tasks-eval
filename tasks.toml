[[tasks]]
id          = "single-backstack"
name        = "Use single list instance for backstack"
category    = "refactor"
parent_sha  = "d9989040b2f2393b394bc01737628fe85d084405"
commit_sha  = "a07978a"
run_build   = true
min_similarity = 0.75
prompt = """
The navigation backstack is recreated as a new list on every access, causing \
unnecessary Compose recompositions. Refactor to use a single stable instance:
  app/shared/src/commonMain/kotlin/org/jetbrains/kotlinconf/navigation/NavState.kt
  app/shared/src/commonMain/kotlin/org/jetbrains/kotlinconf/navigation/Navigator.kt
Change currentBackstack in NavState to a mutableStateListOf(...) that is mutated \
in place rather than replaced. Update topLevelRoute's setter to clear and re-fill \
the list. Update Navigator.kt to reference state.currentBackstack directly."""

