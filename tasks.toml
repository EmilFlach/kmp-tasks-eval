# KMP Tasks Eval — task definitions
#
# Each [[tasks]] entry maps to one git commit from https://github.com/JetBrains/kotlinconf-app.
# The agent starts at parent_sha and must reproduce the changes in commit_sha.
#
# Fields
# ------
# id             unique slug used as --tasks filter
# name           human-readable label
# category       upgrade | bugfix | refactor | feature
# parent_sha     full SHA the agent's project is extracted from
# commit_sha     short SHA the agent must reproduce
# prompt         task description given to the agent
# run_build      whether to run :app:shared:compileKotlinJvm after the agent (default: true)
# min_similarity line-level similarity threshold per file (default: 0.70)
# skip_patterns  list of path substrings to exclude from verification (default: [])

[[tasks]]
id          = "update-deps"
name        = "Update Kotlin and Compose dependencies"
category    = "upgrade"
parent_sha  = "b648958697275d3142180d0595fcced2e38fba6a"
commit_sha  = "0cf25cb"
run_build   = true
min_similarity = 0.85
prompt = """
Update the project dependencies in gradle/libs.versions.toml:
- Kotlin: upgrade to 2.3.20
- AndroidX Activity Compose: upgrade to 1.13.0
- AndroidX Lifecycle: upgrade to 2.11.0-alpha01
- AndroidX Navigation3: upgrade to 1.1.0-alpha04
Also remove the explicit `androidx.core.ktx` dependency from \
app/shared/build.gradle.kts — it is now provided transitively."""

