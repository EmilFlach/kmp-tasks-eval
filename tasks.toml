[[tasks]]
id             = "generate-kmp-project"
name           = "Generate a full KMP project from scratch"
category       = "Generating"
type           = "generation"
generation_url = "https://kmp.jetbrains.com/generateKmtProject?name=KotlinProject&id=org.example.project&spec=%7B%22template_id%22%3A%22kmt%22%2C%22targets%22%3A%7B%22android%22%3A%7B%22ui%22%3A%5B%22compose%22%5D%7D%2C%22ios%22%3A%7B%22ui%22%3A%5B%22compose%22%5D%7D%2C%22desktop%22%3A%7B%22ui%22%3A%5B%22compose%22%5D%7D%2C%22web%22%3A%7B%22ui%22%3A%5B%22compose%22%5D%7D%2C%22server%22%3A%7B%22engine%22%3A%5B%22ktor%22%5D%7D%7D%2C%22include_tests%22%3Atrue%7D"
run_build      = true
min_similarity = 0.50
skip_patterns  = [
    "\\.gradle/",       # Gradle cache directories
    "^build/",          # Compiled output
    "\\.idea/",         # IDE project files
    "gradle-wrapper\\.jar",   # Binary Gradle wrapper jar
    "\\.DS_Store",
]
prompt = """
Create a new Kotlin Multiplatform project from scratch.

Project details:
- Name: KotlinProject
- Application ID / package: org.example.project

The project should support the following platforms using Compose Multiplatform for the UI:
- Android
- iOS
- Desktop (JVM)
- Web (Kotlin/Wasm)

It should also include a server module using Ktor.

Technical requirements:
- Use Gradle with Kotlin DSL (.kts files) for all build scripts
- Use a Gradle version catalog at gradle/libs.versions.toml for dependency management
- Include unit tests
- Place the shared multiplatform UI code in a module named "composeApp"
- Place the server code in a module named "server"
- Include all required configuration: settings.gradle.kts, root build.gradle.kts, \
per-module build.gradle.kts files, gradle wrapper (gradlew, gradlew.bat, \
gradle/wrapper/gradle-wrapper.properties), and .gitignore

Generate all files directly in the current working directory (do not create a subdirectory).
"""